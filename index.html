<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="column">
              <div class="team-header">
                <img src="images/lakers.png" alt="Los angeles lakers logo">
                <h3>Los angeles lakers</h3>
              </div>
                <h2 class="score">0</h2>
                <div>
                    <button onclick="addPoint(this, 1)">+1</button>
                    <button onclick="addPoint(this, 2)">+2</button>
                    <button onclick="addPoint(this, 3)">+3</button>
                </div>
            </div>
            <div class="column">
              <div class="team-header">
                <img src="images/bulls.png" alt="Chicago bulls">
                <h3>Chicago Bulls</h3>
              </div>
                <h2 class="score">0</h2>
                <div>
                    <button onclick="addPoint(this, 1)">+1</button>
                    <button onclick="addPoint(this, 2)">+2</button>
                    <button onclick="addPoint(this, 3)">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
